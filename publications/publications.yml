- key: "beecham_framework_2022"
  path: "/publications/beecham-framework-2022/"
  title: "A Framework for Inserting Visually Supported Inferences into Geographical Analysis Workflow: Application to Road Safety Research"
  date: "2022-01-01"
  year: 2022
  type: "Journal Article"
  venue: "Geographical Analysis"
  doi: "10.1111/gean.12338"
  url: "https://onlinelibrary.wiley.com/doi/abs/10.1111/gean.12338"
  authors: "Roger Beecham, Robin Lovelace"
  abstract: "Road safety research is a data-rich field with large social impacts. Like in medical research, the ambition is to build knowledge around risk factors that can save lives. Unlike medical research, road safety research generates empirical findings from messy observational datasets. Records of road crashes contain numerous intersecting categorical variables, dominating patterns that are complicated by confounding and, when conditioning on data to make inferences net of this, observed effects that are subject to uncertainty due to diminishing sample sizes. We demonstrate how visual data analysis approaches can inject rigor into exploratory analysis of such datasets. A framework is presented whereby graphics are used to expose, model and evaluate spatial patterns in observational data, as well as protect against false discovery. Evidence for the framework is presented through an applied data analysis of national crash patterns recorded in STATS19, the main source of road crash information in Great Britain. Our framework moves beyond typical depictions of exploratory data analysis and transfers to complex data analysis decision spaces characteristic of modern geographical analysis."
- key: "vidaltortosa_socioeconomic_2021"
  path: "/publications/vidaltortosa-socioeconomic-2021/"
  title: "Socioeconomic inequalities in cycling safety: An analysis of cycling injury risk by residential deprivation level in England"
  date: "2021-12-01"
  year: 2021
  type: "Journal Article"
  venue: "Journal of Transport & Health"
  doi: "10.1016/j.jth.2021.101291"
  url: "https://www.sciencedirect.com/science/article/pii/S2214140521003212"
  authors: "Eugeni Vidal Tortosa, Robin Lovelace, Eva Heinen, Richard P. Mann"
  abstract: "Introduction Previous studies have found a positive association between cycling injury risk and residential deprivation. However, most of these studies focused on serious and fatal injuries, children, and a specific point in time. This study explores i) inequalities in cycling injury risk by residential deprivation for all recorded casualties (slight, serious, and fatal) in England, ii) whether these inequalities vary by sex and age, and iii) how they have changed over time. Methods Using the STATS19 database of road traffic casualties in Britain, the English National Travel Survey, and population estimates for England over the six-year period 2014–2019, we estimated the ratio of slight, serious, and fatal cycling casualties per billion kilometres cycled by residential Index of Multiple Deprivation (IMD) quintile; by residential IMD quintile and sex and age group; and by residential IMD quintile and year. Results We found that the higher the level of residential deprivation, the higher the slight and serious cycling injury risk. The fatal cycling injury risk was also higher in individuals from the most deprived areas. Inequalities were particularly large for children, with slight and serious rates three times higher for children from the most deprived areas than for children from the least deprived areas. We also found that the linear trend lines of the slight and serious injury rates between 2014 and 2019 declined in the least deprived quintiles but not in the most deprived quintiles, which suggests that inequalities in slight and serious cycling injuries may have grown over the last years. Conclusion This study found that people from deprived areas are at higher risk of cycling injury for all types of severity; that children from deprived areas are most at risk; and that these inequalities may have recently increased."
- key: "vidaltortosa_infrastructure_2021"
  path: "/publications/vidaltortosa-infrastructure-2021/"
  title: "Infrastructure is not enough: Interactions between the environment, socioeconomic disadvantage and cycling participation in England"
  date: "2021-01-01"
  year: 2021
  type: "Journal Article"
  venue: "Journal of Transport and Land Use"
  doi: "10.5198/jtlu.2021.1781"
  url: "https://www.jtlu.org/index.php/jtlu/article/view/1781"
  authors: "Eugeni Vidal Tortosa, R. Lovelace, E. Heinen, R. P. Mann"
  abstract: "Cycling can be particularly beneficial for socioeconomically disadvantaged populations. First, because it can allow them to access opportunities that by other modes they may not afford. Secondly, because it can increase their physical activity levels and, consequently, improve their health. We analyse the extent to which socioeconomic disadvantage impacts on cycling participation in England, for both leisure and utility cycling. Then, we explore the extent to which this impact could be explained by the environment in which disadvantaged populations live. The study population includes 167,178 individuals, residing in 2,931 areas, and 326 Local Authorities. Data on individual factors were drawn from the Active Lives Survey, and data on environmental factors from several sources. Descriptive statistics and multilevel logistic models were estimated. The likelihood of cycling is lower among people living in deprived areas than among people living in non-deprived areas. This difference is significant for leisure, but also for utility cycling when controlling for individual and environmental factors. The study also found that cycling infrastructure and greater levels of cyclability are higher in deprived areas than in non-deprived areas. This suggests that infrastructure and cyclability are not enough to increase cycling levels among disadvantaged populations. Further research on other barriers to cycling among disadvantaged populations is required."
- key: "woodcock_health_2021a"
  path: "/publications/woodcock-health-2021-a/"
  title: "Health, environmental and distributional impacts of cycling uptake: The model underlying the Propensity to Cycle tool for England and Wales"
  date: "2021-09-01"
  year: 2021
  type: "Journal Article"
  venue: "Journal of Transport & Health"
  doi: "10.1016/j.jth.2021.101066"
  url: "https://www.sciencedirect.com/science/article/pii/S2214140521000967"
  authors: "James Woodcock, Rachel Aldred, Robin Lovelace, Tessa Strain, Anna Goodman"
  abstract: "Introduction The Propensity to Cycle Tool (PCT) is a widely used free, open source and publicly available tool for modelling cycling uptake and corresponding health and carbon impacts in England and Wales. In this paper we present the methods for our new individual-level modelling representing all commuters in England and Wales. Methods Scenario commuter cycling potential in the PCT is modelled as a function of route distance and hilliness between home and work. Our new individual-level approach has allowed us to create an additional “Near Market” scenario where age, gender, ethnicity, car ownership and area level deprivation also affect an individual’s likelihood of switching to cycling. For this and other scenarios, we calculate the carbon benefits of cycling uptake based on the trip distance and previous mode, while health benefits are additionally affected by hilliness and baseline average mortality risk. This allows the estimation of how health and carbon benefits differ by demographic group as well as by scenario. Results While cycle commuting in England and Wales is demographically skewed towards men and white people, women and people from ethnic minorities have greater cycling potential based on route distance and hilliness. Benefits from cycling uptake are distributed differently again. For example, while increasing female cycling mode share is good for equity, each additional female cyclist generates a smaller average health and carbon benefit than a male cyclist. This is based on women’s lower baseline mortality risk, shorter commute travel distances, and lower propensity to commute by car than men. Conclusion We have demonstrated a new approach to modelling that allows for more sophisticated and nuanced assessment of cycling uptake and subsequent benefits, under different scenarios. Health and carbon are increasingly incorporated into appraisal of active travel schemes, valuing important outcomes. However, especially with better representation of demographic factors, this can act as a barrier to equity goals."
- key: "vidaltortosa_cycling_2021"
  path: "/publications/vidaltortosa-cycling-2021/"
  title: "Cycling behaviour and socioeconomic disadvantage: An investigation based on the English National Travel Survey"
  date: "2021-10-01"
  year: 2021
  type: "Journal Article"
  venue: "Transportation Research Part A: Policy and Practice"
  doi: "10.1016/j.tra.2021.08.004"
  url: "https://www.sciencedirect.com/science/article/pii/S0965856421002019"
  authors: "Eugeni Vidal Tortosa, Robin Lovelace, Eva Heinen, Richard P. Mann"
  abstract: "One of the main challenges for policymakers aiming to promote cycling in car-oriented transport systems is how to increase social diversity among its users. The under-representation of certain groups makes it difficult to normalise cycling and distribute its benefits throughout society. Many studies have explored cycling levels in relation to age and gender, and to a lesser extent disability and ethnicity. Less attention has been paid to bicycle use related to income and other socioeconomic factors associated with disadvantage. This study aims to better understand the relationship between income and other factors of socioeconomic disadvantage and cycling behaviour. We analysed data from the English National Travel Survey to estimate the likelihood of cycling participation (if individuals cycle at all), cycling frequency (“how often” they cycle), and cycling distance (“how far” they cycle) using regression models. We found that people in lower-income households cycle less for transport, particularly for commuting, than people in higher-income households. However, no income inequalities were found for leisure cycling. In addition, low-income leisure cyclists were found to cycle more often, but higher-income leisure cyclists further. Our findings may have important policy implications. Favouring a broader focus on non-commuting cycling and subsidising cycle access and maintenance could help to diversify cycling."
- key: "lovelace_clockboard_2021"
  path: "/publications/lovelace-clockboard-2021/"
  title: "ClockBoard: A zoning system for urban analysis"
  date: "2021-08-01"
  year: 2021
  type: "Report"
  venue: "OSF Preprints"
  doi: "10.31219/osf.io/vncgw"
  url: "https://osf.io/vncgw/"
  authors: "Robin Lovelace, Martijn Tennekes, Dustin Carlino"
  abstract: "Zones are the building blocks of urban analysis. Fields ranging from demographics to transport planning routinely use zones — spatially contiguous areal units that break-up continuous space into discrete chunks — as the foundation for diverse analysis techniques. Key methods such as origin-destination analysis and choropleth mapping rely on zones with appropriate sizes, shapes and coverage. However, existing zoning systems are sub-optimal in many urban analysis contexts, for three main reasons: 1) available administrative zoning systems are often based on somewhat arbitrary factors; 2) evidence-based zoning systems are often highly variable in size and shape, reducing their utility for inter-city comparison; and 3) official zoning systems are non-existent, not publicly available, or are too coarse, hindering urban analysis in many places, especially in low income nations. To tackle these three key issues we developed a flexible, open and scalable solution: the ClockBoard zoning system. ClockBoard consists of 12 segments divided by concentric rings of increasing distance, creating a consistent visual frame of reference for cities that is reminiscent of a clock and a dartboard. This paper outlines the design, potential uses and merits of the ClockBoard zoning system and discusses future avenues for research and development of new zoning systems based on the experience."
- key: "talbot_active_2021a"
  path: "/publications/talbot-active-2021-a/"
  title: "Active Travel Oriented Development: Assessing the suitability of sites for new homes"
  date: "2021-01-01"
  year: 2021
  type: "Journal Article"
  venue: "OSF Preprints"
  doi: ""
  url: ""
  authors: "Joseph Talbot, Martin Lucas-Smith, Andrew Speakman, Megan Streb, Simon Nuttall, Dustin Carlino, Patrick Johansson, Nathanael Sheehan, Nikée Groot, Robin Lovelace"
  abstract: "The location of new housing developments, and the provision of safe space for walking and cycling to key destinations around them, have major and long lasting impacts on travel behaviour, health, and environmental outcomes. Transit Oriented Development (TOD) is a well-recognised concept in urban planning, but systemic evidence is often lacking on the likely “active travel performance” of new developments, making it hard for the planning process to support sustainable transport objectives. This paper articulates the concept of“Active Travel Oriented Development” (ATOD) and describes methods for operationalising it. We demonstrate the use of a set of simple metrics to assess the active travel performance of new and proposed development sites. ATOD has the benefits of building on the established concept of TOD and being easy to assess. We conclude that ATOD, and tools for measuring it, are needed to ensure that transport and development policies work in harmony."
- key: "talbot_active_2021"
  path: "/publications/talbot-active-2021/"
