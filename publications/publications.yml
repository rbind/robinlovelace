  url: ""
  authors: "R Lovelace, N Groot, M Adepeju, M Padgham"
  abstract: "This research applies transport modeling techniques to evaluate the potential for cycling in Accra, Ghana, and Kathmandu, Nepal. It analyzes route networks to identify opportunities for active travel interventions in rapidly developing urban areas."
- key: "woodcock_development_2018"
  path: "/publications/woodcock-development-2018/"
  title: "Development of the Impacts of Cycling Tool (ICT): A modelling study and web tool for evaluating health and environmental impacts of cycling uptake"
  date: "2018-07-01"
  year: 2018
  type: "Journal Article"
  venue: "PLOS Medicine"
  doi: "10.1371/journal.pmed.1002622"
  url: "http://journals.plos.org/plosmedicine/article?id=10.1371/journal.pmed.1002622"
  authors: "James Woodcock, Ali Abbas, Alvaro Ullrich, Marko Tainio, Robin Lovelace, Thiago H. Sá, Kate Westgate, Anna Goodman"
  abstract: "Background A modal shift to cycling has the potential to reduce greenhouse gas emissions and provide health co-benefits. Methods, models, and tools are needed to estimate the potential for cycling uptake and communicate to policy makers the range of impacts this would have. Methods and findings The Impacts of Cycling Tool (ICT) is an open source model with a web interface for visualising travel patterns and comparing the impacts of different scenarios of cycling uptake. It is currently applied to England. The ICT allows users to visualise individual and trip-level data from the English National Travel Survey (NTS), 2004–2014 sample, 132,000 adults. It models scenarios in which there is an increase in the proportion of the population who cycle regularly, using a distance-based propensity approach to model which trips would be cycled. From this, the model estimates likely impact on travel patterns, health, and greenhouse gas emissions. Estimates of nonoccupational physical activity are generated by fusing the NTS with the English Active People Survey (APS, 2013–2014, 559,515 adults) to create a synthetic population. Under “equity” scenarios, we investigate what would happen if cycling levels increased equally among all age and gender categories, as opposed to in proportion to the profile of current cyclists. Under electric assist bike (pedelecs or “e-bike”) scenarios, the probability of cycling longer trips increases, based on the e-bike data from the Netherlands, 2013–2014 Dutch Travel Survey (50,868 adults).Outcomes are presented across domains including transport (trip duration and trips by mode), health (physical activity levels, years of life lost), and car transport–related CO2 emissions. Results can be visualised for the whole population and various subpopulations (region, age, gender, and ethnicity). The tool is available at www.pct.bike/ict. If the proportion of the English population who cycle regularly increased from 4.8% to 25%, then there would be notable reductions in car miles and passenger related CO2 emissions (2.2%) and health benefits (2.1% reduction in years of life lost due to premature mortality). If the new cyclists had access to e-bikes, then mortality reductions would be similar, while the reduction in car miles and CO2 emissions would be larger (2.7%). If take-up of cycling occurred equally by gender and age (under 80 years), then health benefits would be marginally greater (2.2%) but reduction in CO2 slightly smaller (1.8%). The study is limited by the quality and comparability of the input data (including reliance on self-report behaviours). As with all modelling studies, many assumptions are required and potentially important pathways excluded (e.g. injury, air pollution, and noise pollution). Conclusion This study demonstrates a generalisable approach for using travel survey data to model scenarios of cycling uptake that can be applied to a wide range of settings. The use of individual-level data allows investigation of a wide range of outcomes, and variation across subgroups. Future work should investigate the sensitivity of results to assumptions and omissions, and if this varies across setting."
- key: "lovelace_propensity_2017"
  path: "/publications/lovelace-propensity-2017/"
  title: "The Propensity to Cycle Tool: An open source online system for sustainable transport planning"
  date: "2017-01-01"
  year: 2017
  type: "Journal Article"
  venue: "Journal of Transport and Land Use"
  doi: "10.5198/jtlu.2016.862"
  url: "https://doi.org/10.5198/jtlu.2016.862"
  authors: "Robin Lovelace, Anna Goodman, Rachel Aldred, Nikolai Berkoff, Ali Abbas, James Woodcock"
  abstract: "Getting people cycling is an increasingly common objective in transport planning institutions worldwide. A growing evidence base indicates that high quality infrastructure can boost local cycling rates. Yet for infrastructure and other cycling measures to be effective, it is important to intervene in the right places, such as along “desire lines” of high latent demand. This creates the need for tools and methods to help answer the question “where to build?”. Following a brief review of the policy and research context related to this question, this paper describes the design, features and potential applications of such a tool. The Propensity to Cycle Tool (PCT) is an online, interactive planning support system that was initially developed to explore and map cycling potential across England (see www.pct.bike). Based on origin-destination data it models cycling levels at area, desire line, route and route network levels, for current levels of cycling, and for scenario-based “cycling futures.” Four scenarios are presented, including “Go Dutch” and “Ebikes,” which explore what would happen if English people had the same propensity to cycle as Dutch people and the potential impact of electric cycles on cycling uptake. The cost effectiveness of investment depends not only on the number of additional trips cycled, but on wider impacts such as health and carbon benefits. The PCT reports these at area, desire line, and route level for each scenario. The PCT is open source, facilitating the creation of scenarios and deployment in new contexts. We conclude that the PCT illustrates the potential of online tools to inform transport decisions and raises the wider issue of how models should be used in transport planning."
- key: "moreno-monroy_public_2017"
  path: "/publications/moreno-monroy-public-2017/"
  title: "Public transport and school location impacts on educational inequalities: Insights from São Paulo"
  date: "2017-09-01"
  year: 2017
  type: "Journal Article"
  venue: "Journal of Transport Geography"
  doi: "10.1016/j.jtrangeo.2017.08.012"
  url: "http://www.sciencedirect.com/science/article/pii/S0966692316303453"
  authors: "Ana I. Moreno-Monroy, Robin Lovelace, Frederico R. Ramos"
  abstract: "In many large Latin American urban areas such as the São Paulo Metropolitan Region (SPMR), growing social and economic inequalities are embedded through high spatial inequality in the provision of state schools and affordable public transport to these schools. This paper sheds light on the transport-education inequality nexus with reference to school accessibility by public transport in the SPMR. To assess school accessibility, we develop an accessibility index which combines information on the spatial distribution of adolescents, the location of existing schools, and the public transport provision serving the school catchment area into a single measure. The index is used to measure school accessibility locally across 633 areas within the SPMR. We use the index to simulate the impact of a policy aiming at increasing the centralisation of public secondary education provision, and find that it negatively affects public transport accessibility for students with the lowest levels of accessibility. These results illustrate how existing inequalities can be amplified by variable accessibility to schools across income groups and geographical space. The research suggests that educational inequality impacts of school agglomeration policies should be considered before centralisation takes place."
- key: "smith_population_2017"
  path: "/publications/smith-population-2017/"
  title: "Population Synthesis with Quasirandom Integer Sampling"
  date: "2017-01-01"
  year: 2017
  type: "Journal Article"
  venue: "Journal of Artificial Societies and Social Simulation"
  doi: "10.18564/jasss.3550"
  url: "http://jasss.soc.surrey.ac.uk/20/4/14.html"
  authors: "Andrew Smith, Robin Lovelace, Mark Birkin"
  abstract: "Established methods for synthesising a population from geographically aggregated data are robust and well understood. However, most rely on the potentially detrimental process of integerisation if a whole individual population is required, e.g. for use in agent-based modelling (ABM). This paper describes and investigates the use of quasirandom sequences to sample populations from known marginal constraints whilst preserving those marginal distributions. We call this technique Quasirandom Integer Without-replacement Sampling (QIWS) and show that the statistical properties of quasirandomly sampled populations to be superior to those of pseudorandomly sampled ones in that they tend to yield entropies much closer to populations generated using the entropy-maximising iterative proportional fitting (IPF) algorithm. The implementation is extremely efficient, easily outperforming common IPF implementations. It is freely available as an open source R package called humanleague. Finally, we suggest how the current limitations of the implementation can be overcome, providing a direction for future work."
- key: "padgham_osmdata_2017"
  path: "/publications/padgham-osmdata-2017/"
  title: "Osmdata"
  date: "2017-06-01"
  year: 2017
  type: "Journal Article"
  venue: "The Journal of Open Source Software"
  doi: "10.21105/joss.00305"
  url: "https://doi.org/10.21105/joss.00305"
  authors: "Mark Padgham, Robin Lovelace, Maëlle Salmon, Bob Rudis"
  abstract: "osmdata imports OpenStreetMap (OSM) data into R as either Simple Features or R Spatial objects, respectively able to be processed with the R packages sf and sp. OSM data are extracted from the Overpass API and processed with very fast C++ routines for return to R. The package enables simple Overpass queries to be constructed without the user necessarily understanding the syntax of the Overpass query language, while retaining the ability to handle arbitrarily complex queries. Functions are also provided to enable recursive searching between different kinds of OSM data (for example, to find all lines which intersect a given point). The package is faster than current alternatives for importing OSM data into R and is the only one compatible with sf."
- key: "lovelace_new_2017"
  path: "/publications/lovelace-new-2017/"
  title: "New tools of the trade? The potential and pitfalls of’Machine Learning’and’DAGs’ to model origin-destination data"
  date: "2017-01-01"
  year: 2017
  type: "Conference Paper"
  venue: "GeoComputation 2017"
  doi: ""
  url: ""
  authors: "Robin Lovelace, Ilan Fridman-Rojas"
  abstract: "This article explores the application of machine learning and Directed Acyclic Graphs (DAGs) in the analysis of origin-destination data, discussing both the technical opportunities and the challenges of interpretability."
- key: "lovelace_new_2017a"
  path: "/publications/lovelace-new-2017-a/"
  title: "New tools of the trade? The potential and pitfalls of ’Machine Learning’ and ’DAGs’ to model origin-destination data"
  date: "2017-09-01"
  year: 2017
  type: "Conference Paper"
  venue: "GeoComputation 2017"
  doi: ""
  url: "http://www.geocomputation.org/2017/papers/73.pdf"
  authors: "R. Lovelace, I. Fridman-Rojas, R. Long"
  abstract: "This paper explores the potential for emerging methods Machine Learning and Directed Acyclic Graphs (DAGs) to be applied to transport modelling at the origin-destination (OD) level. OD data is inherently spatial and is complex, due to the multitude of ways of allocating geographic attributes to the OD pairs (e.g. buffers and intersections with geographic representations of OD data generated using straight desire lines, shortest path algorithms or probabilistic routing). This makes their analysis an interesting geocomputational challenge, seldom tackled by geographers. The application of Machine Learning and DAG methods, developed in other fields, to this geographical data holds great potential to improve the ability to infer causality in mode split from OD data. However, there are also pitfalls to using these methods which can be black boxes, even if the code is open source, if the analyst does not understand what they are doing with the data. Based on the work we discuss ways to ensure new methods in the field are used wisely and set-out next steps for our own research."
- key: "morton_exploring_2017"
  path: "/publications/morton-exploring-2017/"
  title: "Exploring the effect of local transport policies on the adoption of low emission vehicles: Evidence from the London Congestion Charge and Hybrid Electric Vehicles"
  date: "2017-11-01"
  year: 2017
  type: "Journal Article"
  venue: "Transport Policy"
  doi: "10.1016/j.tranpol.2017.08.007"
  url: "http://www.sciencedirect.com/science/article/pii/S0967070X1730080X"
  authors: "Craig Morton, Robin Lovelace, Jillian Anable"
  abstract: "The London Congestion Charge (LCC) is a transport policy with a precise spatial footprint. As such, its impact on the transport system can be expected to vary over space, providing an opportunity to explore the geographical reach of local transport interventions. This paper assesses whether the exemption of Hybrid Electric Vehicles (HEVs) from the LCC affected the registration rate of these vehicles in Greater London and the surrounding areas. The analysis uses official data on the number of HEVs registered across the local authorities of the United Kingdom. This dataset is assessed using [1] exploratory spatial analysis to determine the degree of spatial variation in HEV registrations, [2] area classifications to consider if HEV registrations diminish as nearness to the LCC recedes, and [3] spatial regression models to evaluate the association between distance to the LCC and HEV registrations, controlling for other area characteristics (i.e. socioeconomic, household, and transport system variables). The results clearly show that nearness to the LCC is positively associated with HEV registrations, implying that this form of transport policy is effective at promoting the adoption of low emission vehicles."
- key: "lovelace_david_2017"
