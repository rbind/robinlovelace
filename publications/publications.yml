- key: "morton_fuel_2018a"
  path: "/publications/morton-fuel-2018-a/"
  title: "Fuel price differentials and car ownership: A spatial analysis of diesel cars in Northern Ireland"
  date: "2018-08-01"
  year: 2018
  type: "Journal Article"
  venue: "Transportation Research Part D: Transport and Environment"
  doi: "10.1016/j.trd.2018.07.008"
  url: "http://www.sciencedirect.com/science/article/pii/S1361920918303468"
  authors: "Craig Morton, Robin Lovelace, Ian Philips, Jillian Anable"
  abstract: "Car fleets across much of Europe have undergone a process of dieselisation over the past 20 years. Understanding the factors driving this process is therefore important for sustainable transport policy, with implications for how governments steer their national car fleets towards ultra-low emission vehicles in the future. At a general level, this paper contributes to this wider body of work which aims to understand the factors which led to the transition from petrol to diesel. Specifically, the paper investigates whether the availability of relatively cheap diesel fuel in the Republic of Ireland affected the rate of diesel car ownership in Northern Ireland. A geographic approach is used, which involves generating spatial variables measuring nearness to the Republic of Ireland and comparing these with the proportion of the local car stock that is fuelled by diesel. A series of spatial regression models are specified to determine if this association between nearness to the Republic and diesel ownership persists after accounting for the effect of socioeconomic, travel, and household characteristics. The results support the hypothesis that the availability of cheaper fuel in the Republic of Ireland is not only generating fuel-tourism, but is also affecting the structure of the car fleet registered in Northern Ireland. The findings are relevant beyond the case study and imply that the structure of a country’s car fleet is not only dependent on domestic policies, but is also affected by the policies of neighbouring countries."
- key: "lovelace_estimating_2018a"
  path: "/publications/lovelace-estimating-2018-a/"
  title: "Estimating the Determinants of Cycling: From Area to Road Network Levels"
  date: "2018-06-01"
  year: 2018
  type: "Conference Paper"
  venue: "Journal of Transport & Health"
  doi: "10.1016/j.jth.2018.05.054"
  url: "http://www.sciencedirect.com/science/article/pii/S2214140518302391"
  authors: "Robin Lovelace, John Parkin"
  abstract: "Background It is important to model the determinants of mode choice for many health-related reasons: to find-out what is holding people back from healthy active travel choices, to understand the drivers of detrimental car dependency, and to identify the causal factors over which public authorities have some control. Another motivation is that model results could feed into forecasts of behaviour change following specific interventions. Numerous papers have explored the issue but few have been able to provide results that can feed-into models forecasting uptake following local interventions for a number of reasons including small sample size, lack of a temporal component, and use of explanatory variables that cannot easily be applied beyond the case study region. This gap in the literature was identified and tackled as part of a UK Department for Transport funded project to develop a Cycling Infrastructure Prioritisation Toolkit (CyIPT). Methods Origin-destination (OD) data on commuter mode choice was obtained from the 2001 and 2011 Census. The data was processed to ensure that the 2001 data, which was provided at a different geographic level, as compatible with the 2011 data. It was further processed to create a dependent variable (cycling uptake) and explanatory variables including environmental (e.g. length of off-road cycle infrastructure) and demographic (e.g. age and gender splits) factors, for each desire-line. A model was developed to explain cycling uptake as a function of the explanatory variables and forecast future uptake following simulated interventions. Results Preliminary results show a clear infrastructure signal in the noise surrounding mode choice but other factors seem to be at play. Further research over the coming months will seek to improve the model and our resulting ability to forecast uptake at the local level from specific interventions. Conclusions Newly available data, combined with emerging high performance and open source statistical software, mean that large natural experiments on the impact of new infrastructure on mode choice can now be performed at the national level using geographically detailed data at the origin-destination level. This has the potential to make the prioritisation of new infrastructure much more evidence-based and holds the promise of allowing a-priori benefit-cost estimates to be automated to support transport planners to enable a rapid transition away from fossil fuels and towards healthy travel patterns across the world, in urban and rural areas alike."
