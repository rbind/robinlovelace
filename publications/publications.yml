- key: "uttley_road_2020"
  path: "/publications/uttley-road-2020/"
  title: "Road lighting density and brightness linked with increased cycling rates after-dark"
  date: "2020-05-01"
  year: 2020
  type: "Journal Article"
  venue: "PLOS ONE"
  doi: "10.1371/journal.pone.0233105"
  url: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0233105"
  authors: "Jim Uttley, Steve Fotios, Robin Lovelace"
  abstract: "Cycling has a range of benefits as is recognised by national and international policies aiming to increase cycling rates. Darkness acts as a barrier to people cycling, with fewer people cycling after-dark when seasonal and time-of-day factors are accounted for. This paper explores whether road lighting can reduce the negative impact of darkness on cycling rates. Changes in cycling rates between daylight and after-dark were quantified for 48 locations in Birmingham, United Kingdom, by calculating an odds ratio. These odds ratios were compared against two measures of road lighting at each location: 1) Density of road lighting lanterns; 2) Relative brightness as estimated from night-time aerial images. Locations with no road lighting showed a significantly greater reduction in cycling after-dark compared with locations that had some lighting. A nonlinear relationship was found between relative brightness at a location at night and the reduction in cyclists after-dark. Small initial increases in brightness resulted in large reductions in the difference between cyclist numbers in daylight and after-dark, but this effect reached a plateau as brightness increased. These results suggest only a minimal amount of lighting can promote cycling after-dark, making it an attractive mode of transport year-round."
- key: "lovelace_reproducible_2020"
  path: "/publications/lovelace-reproducible-2020/"
  title: "Reproducible road safety research with R"
  date: "2020-01-01"
  year: 2020
  type: "Report"
  venue: "Royal Automotive Club Foundation"
  doi: ""
  url: "https://www.racfoundation.org/wp-content/uploads/Reproducible_road_safety_research_with_R_Lovelace_December_2020.pdf"
  authors: "Robin Lovelace"
  abstract: "This work discusses the importance of reproducibility in road safety analysis and demonstrates how the R environment facilitates transparent research workflows. It provides examples of data processing and modeling within a reproducible framework."
- key: "pettit_open_2020"
  path: "/publications/pettit-open-2020/"
  title: "Open access, open source and cloud computing: A glimpse into the future of GIS"
  date: "2020-02-01"
  year: 2020
  type: "Journal Article"
  venue: "Handbook of Planning Support Science"
  doi: ""
  url: "https://www.elgaronline.com/view/edcoll/9781788971072/9781788971072.00011.xml"
  authors: "Christopher Pettit, Bob Stimson, Jack Barton, Xavier Goldie, Philip Greenwood, Robin Lovelace, Serryn Eagleson"
  abstract: "<p>Open access data, open source software and cloud computing are three parallel and mutually reinforcing drivers of change in the field of applied geographical information systems (GIS). While these developments create many new opportunities for GIS users and companies, they are also associated with under-explored risks. This chapter investigates cloud GIS, focusing on the Australian Urban Research Infrastructure Network (AURIN), an online, cloud-based data portal and GIS designed explicitly for Australian urban research and public-sector planning applications. AURIN provides direct access to more than 4000 data sets, over 100 spatial analysis tools and powerful computational resources that are typically available in desktop GIS. The experience of developing, communicating and using AURIN has provided insights into the opportunities unleashed by new models of GIS research. This chapter explores those opportunities, such as greater accessibility, transparency and consistency in decision support for public policy, and risks of cloud GIS and its potential uses for social benefit.</p>"
- key: "lovelace_open_2020"
  path: "/publications/lovelace-open-2020/"
  title: "Open access transport models: A leverage point in sustainable transport planning"
  date: "2020-10-01"
  year: 2020
  type: "Journal Article"
  venue: "Transport Policy"
  doi: "10.1016/j.tranpol.2020.06.015"
  url: "http://www.sciencedirect.com/science/article/pii/S0967070X19302781"
  authors: "Robin Lovelace, John Parkin, Tom Cohen"
  abstract: "A large and growing body of evidence suggests fundamental changes are needed in transport systems, to tackle issues such as air pollution, physical inactivity and climate change. Transport models can play a major role in tackling these issues through the transport planning process, but they have historically been focussed on motorised modes (especially cars) and available only to professional transport planners working within the existing paradigm. Building on the principles of open access software, first developed in the context of geographic information systems, this paper develops and discusses the concept of open access transport models, which we define as models that are both developed using open source software and are available to be used by the public without the need for specialist training or the purchase of software licences. We explore the future potential of open access transport models to support the transition away from fossil fuels in the transport sector. We do this with reference to the literature on the use of tools in the planning process, and by exploring an example that is already in use: the “Propensity to Cycle Tool”. We conclude that open access transport models can be a leverage point in the planning process due to their ability to provide robust, transparent and actionable evidence that is available to a range of stakeholders, not just professional transport planners. Open access transport models represent a disruptive technology deserving further research and development, by planners, researchers and citizen scientists, including open source software developers and advocacy groups but, in order to fulfil their potential, they will require both financial and policy support from government bodies."
- key: "lovelace_methods_2020"
  path: "/publications/lovelace-methods-2020/"
  title: "Methods to Prioritise Pop-up Active Transport Infrastructure"
  date: "2020-07-01"
  year: 2020
  type: "Journal Article"
  venue: "Transport Findings"
  doi: "10.32866/001c.13421"
  url: "https://transportfindings.org/article/13421-methods-to-prioritise-pop-up-active-transport-infrastructure"
  authors: "Robin Lovelace, Joseph Talbot, Malcolm Morgan, Martin Lucas-Smith"
  abstract: "In the context of reduced public transport capacity in the wake of the COVID-19 pandemic, governments are scrambling to enable walking and cycling while adhering to physical distancing guidelines. Many pop-up options exist. Of these, road space reallocation represents a “quick win” for cities with “spare space” along continuous road sections that have high latent cycling potential. We developed methods to condense the complexity of city networks down to the most promising roads for road space reallocation schemes. The resulting Rapid Cycleway Prioritisation Tool has been deployed for all cities in England to help prioritise emergency funds for new cycleways nationwide. The methods and concepts could be used to support investment in pop-up infrastructure in cities worldwide."
- key: "lovelace_london_2020"
  path: "/publications/lovelace-london-2020/"
  title: "Is the London Cycle Hire Scheme becoming more inclusive? An evaluation of the shifting spatial distribution of uptake based on 70 million trips"
  date: "2020-10-01"
  year: 2020
  type: "Journal Article"
  venue: "Transportation Research Part A: Policy and Practice"
  doi: "https://doi.org/10.1016/j.tra.2020.07.017"
  url: "http://www.sciencedirect.com/science/article/pii/S0965856420306728"
  authors: "Robin Lovelace, Roger Beecham, Eva Heinen, Eugeni Vidal Tortosa, Yuanxuan Yang, Chris Slade, Antonia Roberts"
  abstract: "Pro-cycling interventions, and cycle hire schemes in particular, are often assumed to primarily benefit the privileged. This framing has played-out in academic research, with many papers exploring the relationship between cycling and existing inequalities. A growing body of evidence suggests that cycle hire schemes tend to serve wealthy areas and young, high income groups, mirroring inequalities in other types of cycling uptake, yet there has been little research into the “direction of travel” and whether such inequalities are growing or “levelling up” over time. This paper explores the uptake of the London Cycle Hire Scheme (LCHS), a large, early and prominent scheme that had the explicit aim of “normalising” cycling. The method involved reproducible analysis (with code documented in the GitHub repo Robinlovelace/cycle-hire-inclusive) of 73.4 million cycle high records spanning 8 years from January 2012 to December 2019, using the geographic location of docking stations alongside official statistics to assess social and spatial inequalities in uptake. The method involved analysis of 73.4 million cycle high records spanning 8 years from January 2012 to December 2019, using the geographic location of docking stations alongside official statistics to assess social and spatial inequalities in uptake. We found that, contrary to the trend for increasing segregation and geographic inequalities, the usage of the LCHS have become increasingly geographically distributed across London over time, with AM peak usage in comparatively low-income areas seeing high levels of growth. Our study shows that cycle hire schemes can be designed and expanded in ways that benefit a wide range of people, including those from low income areas, and that new cycle hire docking stations in poorer areas can succeed."
- key: "reis_different_2020"
  path: "/publications/reis-different-2020/"
  title: "Different people, different incentives? Examining the public acceptance of smartphone-based persuasive strategies for sustainable travel using psychographic segmentation"
  date: "2020-11-01"
  year: 2020
  type: "Journal Article"
  venue: "International Journal of Sustainable Transportation"
  doi: "10.1080/15568318.2020.1836693"
  url: "https://doi.org/10.1080/15568318.2020.1836693"
  authors: "Rafael A. Reis, Susan Grant-Muller, Robin Lovelace, Frances Hodgson"
  abstract: "The development and delivery of ICT-based persuasive strategies for the adoption of more environmental-friendly modes of transport is an emerging strategy to help tackle the problem of excessive use of individual Conventionally Fueled Vehicles (CFVs). The efficiency of this approach, like other information-based schemes, can benefit from the knowledge of which groups of individuals are more responsive to these types of interventions. The goal of this study is to examine the level of acceptability of persuasive schemes delivered using smartphone applications across different population segments. A cross-sectional survey was applied to 920 university students in Curitiba, a roughly 2-million inhabitant Brazilian city. The questionnaire was developed considering two groups of indicators: individual determinants of travel behavior, which were extracted from theories of social psychology (i.e. the Theory of Planned Behavior, the Norm-Activation Model and others), as well as stated intentions and attitudes toward a range of eleven different persuasive strategies (money or voucher rewards, points and rankings, social media sharing, etc.). Groups with different psychographic profiles were extracted from the sample using cluster and discriminant analyses. The acceptability of persuasive strategies were compared between segments. Results show a higher individual preference toward financial rewards and a relatively lower acceptability of social media tools. The acceptance level of groups that display higher control over the use of non-motorized forms of transport is higher than groups that are more psychologically predisposed to CFVs."
- key: "munyombwe_association_2020"
  path: "/publications/munyombwe-association-2020/"
  title: "Association of prevalence of active transport to work and incidence of myocardial infarction: A nationwide ecological study"
  date: "2020-05-01"
  year: 2020
  type: "Journal Article"
  venue: "European Journal of Preventive Cardiology"
  doi: "10.1177/2047487319876228"
  url: "https://doi.org/10.1177/2047487319876228"
  authors: "Theresa Munyombwe, Robin Lovelace, Mark Green, Paul Norman, Sarah Walpole, Marlous Hall, Adam Timmis, Phil Batin, Alistair Brownlee, Jonathan Brownlee, Ged Oliver, Chris P Gale"
  abstract: "BackgroundThere is a paucity of population-based geospatial data about the association between active transport and myocardial infarction. We investigated the association between active transport to work and incidence of myocardial infarction.DesignThis ecological study of 325 local authorities in England included 43,077,039 employed individuals aged 25?74 years (UK Census, 2011), and 117,521 individuals with myocardial infarction (Myocardial Ischaemia National Audit Project, 2011?2013).MethodsBayesian negative binomial regression models were used to investigate the association of active transport to work and incidence of myocardial infarction adjusting for local levels of deprivation, obesity, smoking, diabetes and physical activity.ResultsIn 2011, the prevalence of active transportation to work for people in employment in England aged 25?74 years was 11.4% (4,531,182 active transporters; 8.6% walking and 2.8% cycling). Active transport in 2011 was associated with a reduced incidence of myocardial infarction in 2012 amongst men cycling to work (incidence rate ratio (95% credible interval) 0.983 (0.967?0.999); and women walking to work (0.983 (0.967?0.999)) after full adjustments. However, the prevalence of active transport for men and women was not significantly associated with the combined incidence of myocardial infarction between 2011?2013 after adjusting for physical activity, smoking and diabetes.ConclusionsIn England, the prevalence of active transportation was associated with a reduced incidence of myocardial infarction for women walking and men cycling to work in corresponding local geographic areas. The overall association of active transport with myocardial infarction was, however, explained by local area levels of smoking, diabetes and physical activity."
