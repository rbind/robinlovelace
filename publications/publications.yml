  abstract: "This book provides comprehensive guidance on writing efficient and performant code in the R language. It covers profiling, benchmarking, and optimization strategies for handling large-scale datasets."
- key: "uttley_cycling_2016"
  path: "/publications/uttley-cycling-2016/"
  title: "Cycling promotion schemes and long-term behavioural change: A case study from the University of Sheffield"
  date: "2016-01-01"
  year: 2016
  type: "Journal Article"
  venue: "Case Studies on Transport Policy"
  doi: "10.1016/j.cstp.2016.01.001"
  url: "http://www.sciencedirect.com/science/article/pii/S2213624X16300013"
  authors: "J. Uttley, R. Lovelace"
  abstract: "Cycling has a range of health, environmental and economic benefits compared with motorised forms of transport. There is a need to encourage more cycling, yet previous evaluations of cycling promotion schemes have been inconclusive about what works. A case study of a cycling promotion scheme at the University of Sheffield – the Cycle Challenge – is used in this paper to examine commuting behaviour and long-term behavioural shifts towards cycling in response to outside intervention at the organisational level. The Cycle Challenge was designed to encourage more people at the University to cycle through inter-departmental competition. Cycling behaviour was recorded before the Cycle Challenge and two years after the scheme’s completion. It was found that seventy five percent of participants who were not already regular cyclists reported increased cycling, yet the overall impact of this shift was limited because the majority of participants already cycled regularly. This failure to attract new cyclists suggests recruiting non-cyclists should be a priority in future schemes. Moreover, our study has methodological implications. Current strategies for evaluating the positive impact of cycle initiatives may overestimate the savings by neglecting the tendency of people to resume routine behaviour in the long run. Studies evaluating modal shift should therefore include provision for monitoring long-term behavioural change to provide input into estimated economic, environmental or health metrics of success."
- key: "wilson_path_2016"
  path: "/publications/wilson-path-2016/"
  title: "A Path Toward the Use of Trail Users’ Tweets to Assess Effectiveness of the Environmental Stewardship Scheme: An Exploratory Analysis of the Pennine Way National Trail"
  date: "2016-08-01"
  year: 2016
  type: "Journal Article"
  venue: "Applied Spatial Analysis and Policy"
  doi: "10.1007/s12061-016-9201-7"
  url: "https://link.springer.com/article/10.1007/s12061-016-9201-7"
  authors: "Tom Wilson, Robin Lovelace, Andrew J. Evans"
  abstract: "Large and unofficial data sets, for instance those gathered from social media, are increasingly being used in geographical research and explored as decision support tools for policy development. Social media data have the potential to provide new insight into phenomena about which there is little information from conventional sources. Within this context, this paper explores the potential of social media data to evaluate the aesthetic management of landscape. Specifically, this project utilises the perceptions of visitors to the Pennine Way National Trail, which passes through land managed under the Environmental Stewardship Scheme (ESS). The method analyses sentiment in trail users’ public Twitter messages (tweets) with the aim of assessing the extent to which the ESS maintains landscape character within the trail corridor. The method demonstrates the importance of filtering social media data to convert it into useful information. After filtering, the results are based on 161 messages directly related to the trail. Although small, this sample illustrates the potential for social media to be used as a cheap and increasingly abundant source of information. We suggest that social media data in this context should be seen as a resource that can complement, rather than replace, conventional data sources such as questionnaires and interviews. Furthermore, we provide guidance on how social media could be effectively used by conservation bodies, such as Natural England, which are charged with the management of areas of environmental value worldwide."
- key: "cheshire_spatial_2015"
  path: "/publications/cheshire-spatial-2015/"
  title: "Spatial data visualisation with R"
  date: "2015-01-01"
  year: 2015
  type: "Book Chapter"
  venue: "Geocomputation"
  doi: ""
  url: "https://github.com/geocomPP/sdv"
  authors: "James Cheshire, Robin Lovelace"
  abstract: "This guide demonstrates techniques for creating effective and informative spatial visualizations using the R programming language. It covers a range of mapping methods and graphic packages for geographic data analysis."
- key: "lovelace_evaluating_2015"
  path: "/publications/lovelace-evaluating-2015/"
  title: "Evaluating the performance of Iterative Proportional Fitting for spatial microsimulation: New tests for an established technique"
  date: "2015-03-01"
  year: 2015
  type: "Journal Article"
  venue: "Journal of Artificial Societies and Social Simulation"
  doi: ""
  url: "http://jasss.soc.surrey.ac.uk/18/2/21.html https://www.dropbox.com/s/szexnh80exjv3ov/ipfinr-jasss.pdf?dl=0"
  authors: "Robin Lovelace, Dimitris Ballas, Mark M. H. Birkin, Eveline Leeuwen, Dimitris Ballas, Eveline Leeuwen, Mark M. H. Birkin"
  abstract: "Iterative Proportional Fitting (IPF), also known as biproportional fitting, “raking” or the RAS algorithm, is an established procedure used in a variety of applications across the social sciences. Primary amongst these for urban modelling has been its use in static spatial microsimulation to generate small area microdata — individual level data allocated to administrative zones. The technique is mature, widely used and relatively straight-forward. Although IPF is well described mathematically, accessible examples of the algorithm written in modern programming languages are rare. There is a tendency for researchers to “start from scratch”, resulting in a variety of ad hoc implementations and little evidence about the relative merits of differing approaches. These knowledge gaps mean that answers to certain methodological questions must be guessed: How can “empty cells” be identified and how do they influence model fit? Can IPF be made more computationally efficient? This paper tackles these questions and more using a systematic methodology with publicly available code and data. The results demonstrate the sensitivity of the results to initial conditions, notably the presence of “empty cells”, and the dramatic impact of software decisions on computational efficiency. The paper concludes by proposing an agenda for robust and transparent future tests in the field."
