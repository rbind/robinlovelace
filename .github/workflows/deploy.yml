name: Deploy Quarto Website

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R markdown dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "knitr"), repos="https://cloud.r-project.org")'

      - name: Render Quarto
        run: quarto render

      - name: Ensure CNAME
        run: cp CNAME _site/CNAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: site-files

      - name: Deploy to robinlovelace.github.io
        env:
          GH_PUBLISH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
        run: |
          if [ -z "$GH_PUBLISH_TOKEN" ]; then
            echo "GH_PUBLISH_TOKEN is not set."
            exit 1
          fi

          cd site-files
          touch .nojekyll
          git init
          git checkout -b master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy from robinlovelace.net"
          git push -f "https://x-access-token:${GH_PUBLISH_TOKEN}@github.com/Robinlovelace/robinlovelace.github.io.git" master
