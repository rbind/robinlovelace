name: Deploy Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://robinlovelace.net
    steps:
      - name: Deploy to robinlovelace.github.io
        run: |
          git clone --depth 1 https://github.com/Robinlovelace/robinlovelace.github.io.git /tmp/output
          cd /tmp/output
          git checkout -B main
          git rm -rf . 2>/dev/null || true
          rm -rf *
          cp -r ${{ github.workspace }}/_site/* .
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy from robinlovelace.net" || true
          git push -f https://${{ secrets.GH_PUBLISH_TOKEN }}@github.com/Robinlovelace/robinlovelace.github.io.git main