name: Deploy Quarto Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R markdown dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "knitr"))'

      - name: Render Quarto
        run: quarto render

      - name: Ensure CNAME
        run: cp CNAME _site/CNAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: _site/

  deploy-github-pages-repo:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: site-files

      - name: Deploy to robinlovelace.github.io
        env:
          GH_PUBLISH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
        run: |
          if [ -z "$GH_PUBLISH_TOKEN" ]; then
            echo "GH_PUBLISH_TOKEN is not set."
            exit 1
          fi

          cd site-files
          touch .nojekyll
          git init
          git checkout -b master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy from robinlovelace.net"
          git push -f "https://x-access-token:${GH_PUBLISH_TOKEN}@github.com/Robinlovelace/robinlovelace.github.io.git" master

  deploy-netlify-main:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: site-files

      - name: Check Netlify secrets
        id: netlify_secrets
        run: |
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.netlify_secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Netlify CLI
        if: steps.netlify_secrets.outputs.configured == 'true'
        run: npm i -g netlify-cli

      - name: Deploy main build to Netlify
        if: steps.netlify_secrets.outputs.configured == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --site "$NETLIFY_SITE_ID" \
            --dir site-files \
            --prod \
            --message "main ${GITHUB_SHA}"

      - name: Netlify setup missing
        if: steps.netlify_secrets.outputs.configured != 'true'
        run: |
          echo "NETLIFY_AUTH_TOKEN and/or NETLIFY_SITE_ID not set; skipping Netlify main deploy."

  deploy-netlify-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: site-files

      - name: Check Netlify secrets
        id: netlify_secrets
        run: |
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.netlify_secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Netlify CLI
        if: steps.netlify_secrets.outputs.configured == 'true'
        run: npm i -g netlify-cli

      - name: Deploy PR preview to Netlify
        if: steps.netlify_secrets.outputs.configured == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --site "$NETLIFY_SITE_ID" \
            --dir site-files \
            --alias "pr-${{ github.event.pull_request.number }}" \
            --message "pr-${{ github.event.pull_request.number }} ${GITHUB_SHA}"

      - name: Netlify setup missing
        if: steps.netlify_secrets.outputs.configured != 'true'
        run: |
          echo "NETLIFY_AUTH_TOKEN and/or NETLIFY_SITE_ID not set; skipping Netlify preview deploy."
