name: Deploy Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: quarto render

      - name: Deploy to robinlovelace.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PUBLISH_TOKEN }}
          publish_dir: ./_site
          publish_branch: main
          external_repository: Robinlovelace/robinlovelace.github.io
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          cname: robinlovelace.net