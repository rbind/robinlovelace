name: Deploy Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://robinlovelace.net
    steps:
      - name: Deploy to robinlovelace.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PUBLISH_TOKEN }}
          publish_dir: ./_site
          publish_branch: main
          external_repository: Robinlovelace/robinlovelace.github.io
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          cname: robinlovelace.net